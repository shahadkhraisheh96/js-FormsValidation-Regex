<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="/Task4/AdvancedFormValidation.js" defer></script>
    <title>Advanced Form Validation</title>
    <style>
        body {
    background-color: #f0f2f5;
    display: flex;
    justify-content: center;
    padding: 30px;
}

.registration-container {
    width: 100%;
    max-width: 500px;
    background: #fff;
    border-radius: 20px;
    overflow: hidden; 
}

.form-header {
    background-color: #0056b3;
    color: white;
    text-align: center;
    padding: 15px;
}

.form-body {
    padding: 30px;
    background-color: #e9ecef; }

.row {
    display: flex;
    gap: 15px;
}

.form-group {
    margin-bottom: 20px;
    flex: 1;
}

label {
    display: block;
    font-weight: 600;
    color: #333;
    margin-bottom: 5px;
}

input {
    width: 100%;
    padding: 10px;
    border: 1px solid #adb5bd;
    border-radius: 8px;
    box-sizing: border-box;
    font-size: 14px;
}

.mt-10 { margin-top: 10px; }

.error-text {
    color: #b02a37;
    font-size: 11px;
    margin-top: 5px;
    display: none;
    line-height: 1.4;
}

.register-btn {
    width: 100%;
    padding: 12px;
    background-color: #0056b3;
    color: white;
    border: none;
    border-radius: 25px;
    font-size: 18px;
    font-weight: bold;
    cursor: pointer;
    margin-top: 10px;
}

.register-btn:hover {
    background-color: #004494;
}

.footer-msg {
    text-align: center;
    font-size: 12px;
    color: #6c757d;
    margin-top: 15px;
}
    </style>
</head>
<body>
    <div class="registration-container">
    <div class="form-header">
        <h2>Registration Form</h2>
    </div>

    <form id="registrationForm" class="form-body">
        <div class="row">
            <div class="form-group">
                <label>First Name</label>
                <input type="text" name="firstName" placeholder="">
                <small id="fNameErr" class="error-text">Letters only.</small>
            </div>
            <div class="form-group">
                <label>Last Name</label>
                <input type="text" name="lastName" placeholder="">
                <small id="lNameErr" class="error-text">Letters only.</small>
            </div>
        </div>

        <div class="form-group">
            <label>Date of Birth</label>
            <input type="date" name="dob">
            <small id="dobErr" class="error-text">Please enter a valid date.</small>
        </div>

        <div class="form-group">
            <label>Email Address</label>
            <input type="email" name="userEmail">
            <input type="email" name="confirmEmail" placeholder="Confirm Email" class="mt-10">
            <small id="emailErr" class="error-text">Emails do not match.</small>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password">
            <small id="passErr" class="error-text">
                Password must start with a capital letter, include 2 numbers, 1 special character, and be 8-32 characters.
            </small>
        </div>

        <div class="form-group">
            <label>Confirm Password</label>
            <input type="password" name="confirmPass">
            <small id="confirmPassErr" class="error-text">Passwords do not match.</small>
        </div>

        <button type="submit" class="register-btn">Register</button>
        
        <p class="footer-msg">Please fix the errors above to submit the form.</p>
    </form>
</div>
</body>
</html>
