<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <script src="/Task3/RegexValidation.js" defer></script>
    <title>Regex Validation</title>
    <style>
        *{
            background-color: rgb(225, 218, 218);
        }
        h1{
            text-align: center;
        }
        form{
            text-align: center;
            display:flex;
            flex-direction: column;
            margin: 30px;
           
        }
        label{
            padding: 20px;
            font-weight: bold;
        }
        input{
            width: 200px;
            height: 25px;
            margin-left:20px ;
            border: 1px rgb(152, 151, 151) solid;
        }
        button{
            background-color: rgb(72, 72, 255);
            border-radius: 20px;
            width: 120px;
            height: 40px;
           color: aliceblue;
           border-style: none ;
            align-self: center;
        }
        
    </style>
</head>
<body>
    <div class="registration-container">
    <div class="form-header">
        <h2>Registration Form</h2>
    </div>

    <form id="registrationForm" class="form-body">
        <div class="row">
            <div class="form-group">
                <label>First Name</label>
                <input type="text" name="firstName">
                <small id="fNameErr" class="error-text"></small>
            </div>
            <div class="form-group">
                <label>Last Name</label>
                <input type="text" name="lastName">
                <small id="lNameErr" class="error-text"></small>
            </div>
        </div>

        <div class="form-group">
            <label>Date of Birth</label>
            <input type="date" name="dob">
            <small id="dobErr" class="error-text"></small>
        </div>

        <div class="form-group">
            <label>Email Address</label>
            <input type="text" name="userEmail" placeholder="Enter your email">
            <input type="text" name="confirmEmail" placeholder="Confirm Email" class="mt-10">
            <small id="emailErr" class="error-text"></small>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password">
            <small id="passErr" class="error-text"></small>
        </div>

        <div class="form-group">
            <label>Confirm Password</label>
            <input type="password" name="confirmPass">
            <small id="confirmPassErr" class="error-text"></small>
        </div>

        <button type="submit" class="register-btn">Register</button>
        
        <p class="footer-msg">Please fix the errors above to submit the form.</p>
    </form>
</div>
</body>
</html>
